<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register | Smokehouse Artisan Jerky</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/main.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { corePlugins: { preflight: false }, darkMode: "class" };
    </script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%23c45c26%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22 class=%22lucide lucide-flame%22><path d=%22M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z%22/></svg>">
  </head>
  <body class="page-site page-auth page-transition" data-nav="register" data-bs-theme="dark">
    <div id="page-loader" aria-busy="true" aria-label="Loading">
      <div class="text-center">
        <div class="brand-mark mb-1">Smokehouse</div>
        <div class="small text-uppercase mb-4" style="letter-spacing: 0.22em; opacity: 0.75">Artisan Jerky</div>
        <div class="loader-bar mx-auto"></div>
      </div>
    </div>
    <canvas id="particle-canvas" aria-hidden="true"></canvas>

    <main class="site-main auth-page-main">
      <div class="auth-bg-anim" aria-hidden="true"></div>

      <div class="auth-top-icons">
        <button type="button" class="nav-icon-btn" id="rtlToggle" aria-label="Toggle text direction">
          <i data-lucide="arrow-right-left"></i>
        </button>
        <button type="button" class="nav-icon-btn" id="themeToggle" aria-label="Toggle color theme">
          <i data-lucide="moon" id="themeIcon"></i>
        </button>
      </div>

      <div class="auth-shell">
        <div class="auth-card glass-panel">
          <div class="d-flex flex-column align-items-center mb-4">
            <div class="d-flex align-items-center gap-2 mb-1">
              <i data-lucide="flame" class="text-burnt" style="width: 2rem; height: 2rem;"></i>
              <div class="brand-mark h3 mb-0 text-uppercase">Smokehouse</div>
            </div>
            <div class="small text-uppercase text-muted" style="letter-spacing: 0.22em; font-size: 0.7rem;">Artisan Jerky</div>
          </div>

          <form id="registerForm" novalidate>
            <label class="visually-hidden" for="regName">Full name</label>
            <input class="auth-input" id="regName" type="text" autocomplete="name" placeholder="Full name" required />
            <label class="visually-hidden" for="regEmail">Email</label>
            <input class="auth-input" id="regEmail" type="email" autocomplete="email" placeholder="Email" required />
            <label class="visually-hidden" for="regPhone">Phone</label>
            <input class="auth-input" id="regPhone" type="tel" autocomplete="tel" placeholder="Phone" />
            <div class="position-relative">
              <label class="visually-hidden" for="regPass">Password</label>
              <input class="auth-input pe-5" id="regPass" type="password" autocomplete="new-password" placeholder="Password" required />
              <button type="button" class="btn btn-link position-absolute top-50 end-0 translate-middle-y text-muted toggle-pass" data-target="#regPass" aria-label="Show password" style="text-decoration: none"><i data-lucide="eye"></i></button>
            </div>
            <div class="position-relative">
              <label class="visually-hidden" for="regPass2">Confirm password</label>
              <input class="auth-input pe-5" id="regPass2" type="password" autocomplete="new-password" placeholder="Confirm password" required />
              <button type="button" class="btn btn-link position-absolute top-50 end-0 translate-middle-y text-muted toggle-pass" data-target="#regPass2" aria-label="Show password" style="text-decoration: none"><i data-lucide="eye"></i></button>
            </div>
            <button type="submit" class="btn btn-brand-primary auth-submit magnetic-target">Create account</button>
          </form>
          <div class="text-center text-muted small my-3">or sign up with</div>
          <button type="button" class="social-auth-btn magnetic-target"><i data-lucide="globe"></i> Google</button>
          <button type="button" class="social-auth-btn magnetic-target mb-0"><i data-lucide="apple"></i> Apple</button>
          <p class="small text-center text-muted mt-4 mb-0">Already have an account? <a href="login.html">Sign in</a></p>
          <div class="text-center mt-4">
            <a href="index.html" class="small text-muted text-decoration-none"><i data-lucide="arrow-left" class="d-inline-block align-middle me-1" style="width:12px"></i> Back to Home</a>
          </div>
        </div>
      </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>
    <script src="js/images-data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
  <button id="backToTop" class="back-to-top-btn magnetic-target" aria-label="Back to top"><i data-lucide="arrow-up"></i></button></body>
</html>
